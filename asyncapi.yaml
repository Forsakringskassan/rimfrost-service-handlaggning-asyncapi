asyncapi: 3.0.0
info:
  title: Handläggning Async API
  version: 1.0.0
  description: Handläggning Async API för att skicka meddelande när ett flöde är klart

channels:
  handlaggning.done:
    messages:
      HandlaggningDoneMessage:
        $ref: '#/components/messages/HandlaggningDoneMessage'

operations:
  HandlaggningDoneMessage:
    action: receive
    channel:
      $ref: '#/channels/handlaggning.done'
    messages:
      - $ref: '#/channels/handlaggning.done/messages/HandlaggningDoneMessage'
    summary: Konsumerar event när handläggning är klar
components:
  messages:
    HandlaggningDoneMessage:
      payload:
        title: HandlaggningDoneMessage
        type: object
        required:
          - handlaggningId
        properties:
          handlaggningId:
            type: string
            format: uuid
            description: Unikt ID som identifierar handläggningsärendet
